# ============================================================================
#
# The configuration produced by default is meant to highlight the features
# that Zensical provides and to serve as a starting point for your own
# projects.
#
# ============================================================================

[project]

site_name = "indeduc"
site_description = "Ferramenta de processamento de dados para a Educação."
site_author = "Ricardo Amigo"

repo_url = "https://github.com/instituto-unibanco/indeduc"
repo_name = "instituto-unibanco/indeduc"

copyright = """
Copyright &copy; 2026 The authors
"""

nav = [
  { "indeduc" = "index.md" },
  { "Execução" = [
    { "Execução" = [
      { "Local" = "uso/execucao-local.md" },
      { "Containers" = "uso/execucao-containers.md" },
      { "Nuvem" = "uso/execucao-nuvem.md" },
    ] },
    { "Resultado" = [
      { "Relatórios de Execução" = "uso/relatorios.md" },
    ] },
  ] },
  { "Biblioteca" = [
    { "Biblioteca" = "pipelines/biblioteca.md" },
    { "Privacidade de Dados" = "pipelines/privacidade.md" },
  ] },
  { "Construção" = [
    { "Sua primeira Pipeline" = [
      { "Construção" = "custom/construcao.md" },
      { "Preparação para Execução" = "custom/execucao.md" },
    ]},
    { "Funcionalidades" = [
      { "Schemas" = "custom/schemas.md" },
      { "Pipelines Combinadas" = "custom/combinadas.md" },
      { "Interação com Arquivos" = "custom/arquivos.md" },
      { "Interação com Bancos de Dados" = "custom/bancos.md" },
      { "Etapas" = "custom/etapas.md" },
      { "Tempo de Execução" = "custom/tempo.md" },
    ]},
  ] },
]

extra_css = ["_stylesheets/extra.css"]
extra_javascript = ["_javascripts/extra.js"]

[[project.extra.social]]
icon = "fontawesome/brands/github-alt"
link = "https://github.com/instituto-unibanco"

# ----------------------------------------------------------------------------
# Section for configuring theme options
# ----------------------------------------------------------------------------
[project.theme]

language = "custom"
custom_dir = "docs/_overrides"

logo = "_assets/logo.png"
favicon = "_assets/logo.png"

features = [
    # https://zensical.org/docs/setup/header/#announcement-bar
    "announce.dismiss",

    # https://zensical.org/docs/authoring/code-blocks/#code-annotations
    "content.code.annotate",

    # https://zensical.org/docs/authoring/code-blocks/#code-copy-button
    "content.code.copy",

    # https://zensical.org/docs/authoring/code-blocks/#code-selection-button
    "content.code.select",

    # https://zensical.org/docs/authoring/footnotes/#footnote-tooltips
    "content.footnote.tooltips",

    # https://zensical.org/docs/authoring/content-tabs/#linked-content-tabs
    "content.tabs.link",

    # https://zensical.org/docs/authoring/tooltips/#improved-tooltips
    "content.tooltips",

    # https://zensical.org/docs/setup/footer/#navigation
    "navigation.footer",

    # https://zensical.org/docs/setup/navigation/#section-index-pages
    "navigation.indexes",

    # https://zensical.org/docs/setup/navigation/#instant-navigation
    "navigation.instant",

    # https://zensical.org/docs/setup/navigation/#instant-prefetching
    "navigation.instant.prefetch",

    # https://zensical.org/docs/setup/navigation/#navigation-path
    "navigation.path",

    # https://zensical.org/docs/setup/navigation/#navigation-sections
    "navigation.sections",

    # https://zensical.org/docs/setup/navigation/#navigation-tabs
    "navigation.tabs",

    # https://zensical.org/docs/setup/navigation/#back-to-top-button
    "navigation.top",

    # https://zensical.org/docs/setup/navigation/#anchor-tracking
    "navigation.tracking",

    # https://zensical.org/docs/setup/search/#search-highlighting
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# In this section you can configure the Markdown extensions that are used when
# rendering your documentation.
#
# Read more:
# - https://zensical.org/docs/setup/extensions/
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
